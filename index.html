<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>Shopping Reminder - Server Push</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #f2f2f7;
    padding: 20px;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .container {
    width: 100%;
    max-width: 420px;
    margin: 60px auto 0 auto;
  }
  h1 { font-size: 32px; text-align: center; margin-bottom: 8px; }
  .sub { text-align: center; color: #8e8e93; margin-bottom: 24px; }
  .input-group {
    background: white;
    border-radius: 20px;
    padding: 8px 12px;
    margin-top: 12px;
  }
  input, button {
    width: 100%;
    padding: 14px 16px;
    margin-top: 8px;
    border-radius: 18px;
    border: none;
    font-size: 16px;
  }
  input {
    background: #f9f9fb;
    border: 1px solid #e5e5ea;
  }
  .add-btn {
    background: #34c759;
    color: white;
    font-weight: 600;
    margin-top: 16px;
    cursor: pointer;
  }
  .card {
    background: white;
    padding: 14px;
    margin-top: 12px;
    border-radius: 22px;
  }
  .topRow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .leftSide {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    flex: 1;
  }
  input[type="checkbox"] {
    width: 22px;
    height: 22px;
    margin-top: 2px;
  }
  .item-name {
    font-weight: 600;
    font-size: 16px;
  }
  .item-date {
    font-size: 12px;
    color: #8e8e93;
    margin-top: 4px;
  }
  .done .item-name {
    text-decoration: line-through;
    color: #8e8e93;
  }
  .deleteBtn {
    background: transparent;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #ff3b30;
  }
  img {
    width: 100%;
    border-radius: 18px;
    margin-top: 12px;
    max-height: 180px;
    object-fit: cover;
  }
  .notify-banner {
    background: white;
    border-radius: 20px;
    padding: 14px;
    margin: 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .notify-badge {
    background: #007aff;
    border: none;
    padding: 8px 16px;
    border-radius: 30px;
    color: white;
    font-weight: 500;
    font-size: 13px;
    width: auto;
    cursor: pointer;
  }
  .status-badge {
    font-size: 12px;
    padding: 4px 8px;
    border-radius: 8px;
    background: #e5e5ea;
    display: inline-block;
    margin-left: 8px;
  }
  .status-badge.active {
    background: #34c759;
    color: white;
  }
</style>
</head>
<body>
<div class="container">
  <h1>🛍️ Reminder</h1>
  <div class="sub">Server Push · Works when locked</div>

  <div id="pushStatus"></div>

  <div class="input-group">
    <input id="name" placeholder="Item name" autocomplete="off">
    <input id="date" type="datetime-local">
    <input id="image" placeholder="Image URL (optional)">
  </div>
  <button class="add-btn" onclick="addItem()">➕ Add Item</button>
  <div id="list"></div>
  <footer style="text-align: center; margin-top: 20px; color: #8e8e93; font-size: 12px;">
    ✅ Server push works even when phone is locked!
  </footer>
</div>

<script>
  const SUPABASE_URL = "https://akxoqcizqqqmwezocrvv.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFreG9xY2l6cXFxbXdlem9jcnZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzEyMDIsImV4cCI6MjA4OTU0NzIwMn0.Z6MlXYW47gSlIEYEomjLHUwEeXV7pfBYYq9b73HXzhs";
  
  // Replace with your actual VAPID public key from https://web-push-codelab.glitch.me/
  const VAPID_PUBLIC_KEY = "YOUR_VAPID_PUBLIC_KEY_HERE";
  
  let swRegistration = null;
  
  function formatDate(d) {
    if (!d) return "";
    return new Date(d).toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
  }
  
  async function initPush() {
    const statusDiv = document.getElementById('pushStatus');
    
    if (!('Notification' in window)) {
      statusDiv.innerHTML = `<div class="notify-banner">🔕 Notifications not supported</div>`;
      return;
    }
    
    if (Notification.permission === 'granted') {
      await registerServiceWorker();
      await subscribeToPush();
      statusDiv.innerHTML = `<div class="notify-banner">🔔 Server push active <span class="status-badge active">Works when locked</span></div>`;
    } else if (Notification.permission === 'denied') {
      statusDiv.innerHTML = `<div class="notify-banner">❌ Notifications blocked. Enable in Settings → Safari → Notifications</div>`;
    } else {
      statusDiv.innerHTML = `<div class="notify-banner">
        <span>🔔 Enable server push (works when phone is locked)</span>
        <button class="notify-badge" onclick="requestPushPermission()">Enable</button>
      </div>`;
    }
  }
  
  async function requestPushPermission() {
    const permission = await Notification.requestPermission();
    if (permission === 'granted') {
      await registerServiceWorker();
      await subscribeToPush();
      initPush();
      
      // Send test push via server
      await fetch(`${SUPABASE_URL}/functions/v1/send-push`, {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Authorization': `Bearer ${SUPABASE_KEY}`
        },
        body: JSON.stringify({ test: true })
      });
    }
  }
  
  async function registerServiceWorker() {
    if ('serviceWorker' in navigator) {
      try {
        swRegistration = await navigator.serviceWorker.register('sw.js');
        console.log('SW registered');
        return swRegistration;
      } catch (err) {
        console.error('SW failed:', err);
      }
    }
    return null;
  }
  
  async function subscribeToPush() {
    if (!swRegistration) return;
    
    try {
      let subscription = await swRegistration.pushManager.getSubscription();
      
      if (!subscription) {
        subscription = await swRegistration.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(VAPID_PUBLIC_KEY)
        });
      }
      
      // Save subscription to Supabase
      await fetch(SUPABASE_URL + "/rest/v1/push_subscriptions", {
        method: "POST",
        headers: {
          "Content-Type": "application/json",
          "apikey": SUPABASE_KEY,
          "Authorization": "Bearer " + SUPABASE_KEY
        },
        body: JSON.stringify({
          endpoint: subscription.endpoint,
          keys: subscription.toJSON().keys,
          user_agent: navigator.userAgent
        })
      });
      
      console.log('Push subscription saved to server');
    } catch (err) {
      console.error('Subscription failed:', err);
    }
  }
  
  function urlBase64ToUint8Array(base64String) {
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/\-/g, '+').replace(/_/g, '/');
    const rawData = window.atob(base64);
    const outputArray = new Uint8Array(rawData.length);
    for (let i = 0; i < rawData.length; ++i) {
      outputArray[i] = rawData.charCodeAt(i);
    }
    return outputArray;
  }
  
  async function addItem() {
    const name = document.getElementById('name').value.trim();
    const date = document.getElementById('date').value;
    const image = document.getElementById('image').value.trim();
    
    if (!name) {
      alert('Enter item name');
      return;
    }
    
    await fetch(SUPABASE_URL + "/rest/v1/items", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      },
      body: JSON.stringify({ name, date: date || null, image: image || null, done: false })
    });
    
    await loadItems();
    document.getElementById('name').value = '';
    document.getElementById('date').value = '';
    document.getElementById('image').value = '';
  }
  
  async function toggleDone(id, currentDone) {
    await fetch(SUPABASE_URL + "/rest/v1/items?id=eq." + id, {
      method: "PATCH",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      },
      body: JSON.stringify({ done: !currentDone })
    });
    await loadItems();
  }
  
  async function deleteItem(id) {
    await fetch(SUPABASE_URL + "/rest/v1/items?id=eq." + id, {
      method: "DELETE",
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    });
    await loadItems();
  }
  
  async function loadItems() {
    const res = await fetch(SUPABASE_URL + "/rest/v1/items?select=*&order=date.asc", {
      headers: {
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      }
    });
    const data = await res.json();
    const listDiv = document.getElementById('list');
    if (!listDiv) return;
    listDiv.innerHTML = '';
    
    if (!data.length) {
      listDiv.innerHTML = '<div style="text-align:center;padding:48px;">✨ No items yet</div>';
      return;
    }
    
    data.forEach(item => {
      const div = document.createElement('div');
      div.className = 'card';
      
      const top = document.createElement('div');
      top.className = 'topRow';
      
      const left = document.createElement('div');
      left.className = 'leftSide';
      
      const checkbox = document.createElement('input');
      checkbox.type = 'checkbox';
      checkbox.checked = item.done || false;
      checkbox.onclick = () => toggleDone(item.id, item.done);
      
      const textDiv = document.createElement('div');
      textDiv.className = 'item-text';
      if (item.done) textDiv.classList.add('done');
      
      const nameSpan = document.createElement('div');
      nameSpan.className = 'item-name';
      nameSpan.innerText = item.name;
      
      const dateSpan = document.createElement('div');
      dateSpan.className = 'item-date';
      dateSpan.innerText = item.date ? formatDate(item.date) : 'no due date';
      
      textDiv.appendChild(nameSpan);
      textDiv.appendChild(dateSpan);
      
      left.appendChild(checkbox);
      left.appendChild(textDiv);
      
      const delBtn = document.createElement('button');
      delBtn.className = 'deleteBtn';
      delBtn.innerHTML = '🗑️';
      delBtn.onclick = () => deleteItem(item.id);
      
      top.appendChild(left);
      top.appendChild(delBtn);
      div.appendChild(top);
      
      if (item.image) {
        const img = document.createElement('img');
        img.src = item.image;
        div.appendChild(img);
      }
      
      listDiv.appendChild(div);
    });
  }
  
  // Initialize
  initPush();
  loadItems();
</script>
</body>
</html>
