
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Reminder</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #f2f2f7;
  padding: 16px;
  display: flex;
  justify-content: center;
}

.container {
  width: 100%;
  max-width: 420px;
}

h1 {
  text-align: center;
  font-size: 28px;
  margin-bottom: 10px;
}

/* inputs */
input, button {
  width: 100%;
  padding: 14px;
  margin-top: 10px;
  border-radius: 16px;
  border: none;
  font-size: 16px;
  box-sizing: border-box;
}

input {
  background: white;
}

/* main add button */
button {
  background: #34c759;
  color: white;
  font-weight: bold;
}

/* cards */
.card {
  background: white;
  padding: 14px;
  margin-top: 12px;
  border-radius: 18px;
  font-size: 15px;
}

/* top row layout */
.topRow {
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 10px;
}

/* left side */
.leftSide {
  display: flex;
  align-items: center;
  gap: 10px;
}

/* checkbox */
input[type="checkbox"] {
  width: 20px;
  height: 20px;
}

/* done style */
.done {
  text-decoration: line-through;
  color: gray;
}

/* image */
img {
  width: 100%;
  border-radius: 14px;
  margin-top: 10px;
}

/* delete icon */
.deleteBtn {
  background: transparent;
  border: none;
  font-size: 20px;
  cursor: pointer;
  padding: 6px;
}

/* spacing fix */
span {
  line-height: 1.4;
}
</style>
</head>

<body>

<div class="container">

<h1>Shopping Reminder</h1>

<input id="name" placeholder="Item name">
<input id="date" type="datetime-local">
<input id="image" placeholder="Image URL (optional)">
<button onclick="addItem()">Add Item</button>

<div id="list"></div>

</div>

<script>
const SUPABASE_URL = "https://akxoqcizqqqmwezocrvv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFreG9xY2l6cXFxbXdlem9jcnZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzEyMDIsImV4cCI6MjA4OTU0NzIwMn0.Z6MlXYW47gSlIEYEomjLHUwEeXV7pfBYYq9b73HXzhs";

function formatDate(d) {
  if (!d) return "";
  return new Date(d).toLocaleString([], {
    month: 'short',
    day: 'numeric',
    hour: '2-digit',
    minute: '2-digit'
  });
}

document.addEventListener("keydown", e => {
  if (e.key === "Enter") addItem();
});

async function addItem() {
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const image = document.getElementById("image").value;

  if (!name) {
    alert("Enter item name");
    return;
  }

  await fetch(SUPABASE_URL + "/rest/v1/items", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    },
    body: JSON.stringify({ name, date, image, done: false })
  });

  loadItems();

  document.getElementById("name").value = "";
  document.getElementById("date").value = "";
  document.getElementById("image").value = "";
}

async function toggleDone(id, current) {
  await fetch(SUPABASE_URL + "/rest/v1/items?id=eq." + id, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    },
    body: JSON.stringify({ done: !current })
  });

  loadItems();
}

async function deleteItem(id) {
  await fetch(SUPABASE_URL + "/rest/v1/items?id=eq." + id, {
    method: "DELETE",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    }
  });

  loadItems();
}

async function loadItems() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/items?select=*", {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();
  list.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    const top = document.createElement("div");
    top.className = "topRow";

    const left = document.createElement("div");
    left.className = "leftSide";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = item.done || false;
    checkbox.onclick = () => toggleDone(item.id, item.done);

    const text = document.createElement("span");
    text.innerHTML = `<b>${item.name}</b><br>${formatDate(item.date)}`;

    if (item.done) text.classList.add("done");

    left.appendChild(checkbox);
    left.appendChild(text);

    const delBtn = document.createElement("button");
    delBtn.className = "deleteBtn";
    delBtn.innerHTML = "🗑️";
    delBtn.onclick = () => deleteItem(item.id);

    top.appendChild(left);
    top.appendChild(delBtn);

    div.appendChild(top);

    if (item.image) {
      const img = document.createElement("img");
      img.src = item.image;
      div.appendChild(img);
    }

    list.appendChild(div);
  });
}

loadItems();
</script>

</body>
</html>
