<body>

<h1>Shopping Reminder</h1>

<input id="name" placeholder="Item name">
<input id="date" type="datetime-local">
<input id="image" placeholder="Image URL (optional)">
<button onclick="addItem()">Add Item</button>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://akxoqcizqqqmwezocrvv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFreG9xY2l6cXFxbXdlem9jcnZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzEyMDIsImV4cCI6MjA4OTU0NzIwMn0.Z6MlXYW47gSlIEYEomjLHUwEeXV7pfBYYq9b73HXzhs";

async function addItem() {
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const image = document.getElementById("image").value;

  if (!name) {
    alert("Enter item name");
    return;
  }

  await fetch(SUPABASE_URL + "/rest/v1/items", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY,
      "Prefer": "return=minimal"
    },
    body: JSON.stringify({
      name: name,
      date: date,
      image: image
    })
  });

  loadItems();
}

async function loadItems() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/items?select=*", {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    const img = document.createElement("img");
    img.src = item.image || "https://via.placeholder.com/60";

    const text = document.createElement("div");
    text.innerHTML = `<b>${item.name}</b><br>${item.date || ""}`;

    div.appendChild(img);
    div.appendChild(text);

    list.appendChild(div);
  });
}

loadItems();
</script>

</body>
