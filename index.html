<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Shopping Reminder">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/190/190411.png">
<title>Shopping Reminder | Push Notifications</title>

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    background: #f2f2f7;
    padding: 20px 16px;
    display: flex;
    justify-content: center;
    min-height: 100vh;
  }
  .container {
    width: 100%;
    max-width: 420px;
    margin: 60px auto 0 auto;
  }
  h1 {
    font-size: 32px;
    text-align: center;
    margin-bottom: 8px;
  }
  .sub {
    text-align: center;
    color: #8e8e93;
    font-size: 14px;
    margin-bottom: 24px;
  }
  .input-group {
    background: white;
    border-radius: 20px;
    padding: 8px 12px;
    margin-top: 12px;
  }
  input, button {
    width: 100%;
    padding: 14px 16px;
    margin-top: 8px;
    border-radius: 18px;
    border: none;
    font-size: 16px;
  }
  input {
    background: #f9f9fb;
    border: 1px solid #e5e5ea;
  }
  .add-btn {
    background: #34c759;
    color: white;
    font-weight: 600;
    margin-top: 16px;
    cursor: pointer;
  }
  .card {
    background: white;
    padding: 14px;
    margin-top: 12px;
    border-radius: 22px;
  }
  .topRow {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }
  .leftSide {
    display: flex;
    align-items: flex-start;
    gap: 12px;
    flex: 1;
  }
  input[type="checkbox"] {
    width: 22px;
    height: 22px;
    margin-top: 2px;
    accent-color: #34c759;
  }
  .item-name { font-weight: 600; font-size: 16px; }
  .item-date { font-size: 12px; color: #8e8e93; margin-top: 4px; }
  .done .item-name { text-decoration: line-through; color: #8e8e93; }
  .deleteBtn {
    background: transparent;
    border: none;
    font-size: 22px;
    cursor: pointer;
    color: #ff3b30;
  }
  img {
    width: 100%;
    border-radius: 18px;
    margin-top: 12px;
  }
  .notify-banner {
    background: white;
    border-radius: 20px;
    padding: 14px;
    margin: 20px 0;
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .notify-badge {
    background: #007aff;
    border: none;
    padding: 8px 16px;
    border-radius: 30px;
    color: white;
    font-weight: 500;
    font-size: 13px;
    cursor: pointer;
  }
  .notify-badge.active { background: #34c759; }
  .empty-state { text-align: center; padding: 48px; color: #aeaeb2; }
  .debug-panel {
    background: #1c1c1e;
    color: #fff;
    border-radius: 12px;
    padding: 12px;
    margin: 16px 0;
    font-family: monospace;
    font-size: 10px;
    max-height: 300px;
    overflow-y: auto;
  }
  .debug-entry { padding: 4px 0; border-bottom: 1px solid #333; }
  footer {
    font-size: 12px;
    text-align: center;
    color: #8e8e93;
    margin-top: 28px;
  }
</style>
</head>
<body>

<div class="container">
  <h1>🛍️ Reminder</h1>
  <div class="sub">Push works when phone is locked 🔒</div>

  <div class="input-group">
    <input id="name" placeholder="Item name" autocomplete="off">
    <input id="date" type="datetime-local">
    <input id="image" placeholder="Image URL (optional)">
  </div>
  <button class="add-btn" onclick="addItem()">➕ Add item</button>

  <div id="pushStatus"></div>
  <div id="list"></div>
  
  <div class="debug-panel" id="debugPanel">
    <div class="debug-entry">🔍 Ready - Click Enable to get notifications</div>
  </div>
  
  <footer>✅ Add to Home Screen → Enable → Lock phone → Test with 2 min future date</footer>
</div>

<script src="https://cdn.onesignal.com/sdks/web/v16/OneSignalSDK.page.js"></script>
<script>
  const SUPABASE_URL = "https://akxoqcizqqqmwezocrvv.supabase.co";
  const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFreG9xY2l6cXFxbXdlem9jcnZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzEyMDIsImV4cCI6MjA4OTU0NzIwMn0.Z6MlXYW47gSlIEYEomjLHUwEeXV7pfBYYq9b73HXzhs";
  
  const ONE_SIGNAL_APP_ID = "5e16cae2-f867-49e2-aa01-691d07e78fe5";
  const ONE_SIGNAL_REST_KEY = "os_v2_app_lylmvyxym5e6fkqbneoqpz4p4wh6zaszr4nusle7x5lwmpifvpmlhop4jsvr65voqodzgpqcvtuur7jflw3aw45ctaamkjseafyw3ky";
  
  let onesignalUserId = null;
  let reminders = [];
  
  function debugLog(msg) {
    const time = new Date().toLocaleTimeString();
    const panel = document.getElementById('debugPanel');
    const entry = document.createElement('div');
    entry.className = 'debug-entry';
    entry.innerHTML = `<span style="color:#8e8e93">[${time}]</span> ${msg}`;
    panel.insertBefore(entry, panel.firstChild);
    console.log(msg);
  }
  
  function formatDate(d) {
    if (!d) return "no due date";
    return new Date(d).toLocaleString();
  }
  
  // OneSignal - handles server push
  function initOneSignal() {
    window.OneSignalDeferred = window.OneSignalDeferred || [];
    window.OneSignalDeferred.push(async function(OneSignal) {
      await OneSignal.init({
        appId: ONE_SIGNAL_APP_ID,
        safari_web_id: "web.onesignal.auto.123456",
        notifyButton: { enable: false },
        allowLocalhostAsSecureOrigin: true,
      });
      
      const userId = await OneSignal.User.getOnesignalId();
      if (userId) {
        onesignalUserId = userId;
        localStorage.setItem('onesignal_user_id', userId);
        debugLog(`✅ OneSignal ready! User ID: ${userId.substring(0, 8)}...`);
      }
      updatePushUI();
    });
  }
  
  // Send push via OneSignal (this is the SERVER that actually sends the notification)
  async function sendPush(title, message) {
    if (!onesignalUserId) {
      debugLog(`⚠️ No OneSignal user ID - user needs to enable notifications first`);
      return false;
    }
    
    debugLog(`📡 Sending push to ${onesignalUserId.substring(0, 8)}...`);
    
    try {
      const response = await fetch('https://onesignal.com/api/v1/notifications', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          app_id: ONE_SIGNAL_APP_ID,
          include_player_ids: [onesignalUserId],
          headings: { en: title },
          contents: { en: message },
          ttl: 3600
        })
      });
      
      const result = await response.json();
      if (result.id) {
        debugLog(`✅ Push sent! ID: ${result.id}`);
        return true;
      } else {
        debugLog(`❌ Push failed: ${JSON.stringify(result)}`);
        return false;
      }
    } catch(err) {
      debugLog(`❌ Push error: ${err.message}`);
      return false;
    }
  }
  
  // Store reminder for later
  function storeReminder(item) {
    const reminderTime = new Date(item.date).getTime();
    const now = Date.now();
    const delay = reminderTime - now;
    
    if (delay <= 0 || delay > 30*24*60*60*1000) return;
    
    // Store in localStorage for when app reopens
    const stored = JSON.parse(localStorage.getItem('reminders') || '[]');
    if (!stored.find(r => r.id === item.id)) {
      stored.push({
        id: item.id,
        name: item.name,
        date: item.date,
        reminderTime: reminderTime,
        image: item.image
      });
      localStorage.setItem('reminders', JSON.stringify(stored));
      debugLog(`💾 Stored reminder for "${item.name}" in ${Math.round(delay/1000)}s`);
    }
    
    // Local timer (works while app is open)
    setTimeout(async () => {
      debugLog(`⏰ REMINDER: "${item.name}" is due!`);
      // Send push via OneSignal (works even if app is closed)
      await sendPush("⏰ Shopping Reminder", `${item.name} is due now!`);
      // Local notification for when app is open
      if (Notification.permission === "granted") {
        new Notification("⏰ Shopping Reminder", {
          body: `${item.name} is due now!`,
          icon: item.image || "https://cdn-icons-png.flaticon.com/512/190/190411.png"
        });
      }
    }, delay);
  }
  
  // Check for reminders that fired while app was closed
  function checkPendingReminders() {
    const stored = JSON.parse(localStorage.getItem('reminders') || '[]');
    const now = Date.now();
    let triggered = 0;
    
    stored.forEach(r => {
      if (r.reminderTime <= now) {
        debugLog(`⏰ Found pending: "${r.name}" was due!`);
        sendPush("⏰ Shopping Reminder", `${r.name} was due!`);
        if (Notification.permission === "granted") {
          new Notification("⏰ Shopping Reminder (Delayed)", {
            body: `${r.name} was due!`,
            icon: r.image || "https://cdn-icons-png.flaticon.com/512/190/190411.png"
          });
        }
        triggered++;
      }
    });
    
    const remaining = stored.filter(r => r.reminderTime > now);
    localStorage.setItem('reminders', JSON.stringify(remaining));
    if (triggered) debugLog(`✅ Processed ${triggered} pending reminders`);
  }
  
  function updatePushUI() {
    const container = document.getElementById('pushStatus');
    if (Notification.permission === "granted") {
      container.innerHTML = `<div class="notify-banner"><span>🔔 Push active · Works when locked</span><button class="notify-badge active" onclick="testPush()">Test</button></div>`;
    } else if (Notification.permission === "denied") {
      container.innerHTML = `<div class="notify-banner"><span>❌ Notifications blocked</span></div>`;
    } else {
      container.innerHTML = `<div class="notify-banner"><span>🔔 Enable push (works when locked)</span><button class="notify-badge" onclick="enablePush()">Enable</button></div>`;
    }
  }
  
  async function enablePush() {
    const permission = await Notification.requestPermission();
    if (permission === "granted") {
      debugLog("✅ Permission granted!");
      updatePushUI();
      // Send test push
      setTimeout(() => testPush(), 1000);
    } else {
      debugLog("❌ Permission denied");
    }
  }
  
  function testPush() {
    debugLog("🔔 Sending test push...");
    if (Notification.permission === "granted") {
      new Notification("🔔 Test", { body: "Push works!", icon: "https://cdn-icons-png.flaticon.com/512/190/190411.png" });
    }
    sendPush("🔔 Test", "Your shopping reminder is working!");
  }
  
  // Supabase functions
  async function addItem() {
    const name = document.getElementById('name').value.trim();
    const date = document.getElementById('date').value;
    const image = document.getElementById('image').value.trim();
    
    if (!name) { alert("Enter item name"); return; }
    
    let utcDate = null;
    if (date) utcDate = new Date(date).toISOString();
    
    await fetch(SUPABASE_URL + "/rest/v1/items", {
      method: "POST",
      headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY },
      body: JSON.stringify({ name, date: utcDate, image: image || null, done: false })
    });
    
    await loadItems();
    document.getElementById('name').value = '';
    document.getElementById('date').value = '';
    document.getElementById('image').value = '';
  }
  
  async function toggleDone(id, done) {
    await fetch(SUPABASE_URL + "/rest/v1/items?id=eq." + id, {
      method: "PATCH",
      headers: { "Content-Type": "application/json", "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY },
      body: JSON.stringify({ done: !done })
    });
    await loadItems();
  }
  
  async function deleteItem(id) {
    await fetch(SUPABASE_URL + "/rest/v1/items?id=eq." + id, {
      method: "DELETE",
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
    });
    await loadItems();
  }
  
  async function loadItems() {
    const res = await fetch(SUPABASE_URL + "/rest/v1/items?select=*&order=date.asc", {
      headers: { "apikey": SUPABASE_KEY, "Authorization": "Bearer " + SUPABASE_KEY }
    });
    const data = await res.json();
    const listDiv = document.getElementById('list');
    if (!listDiv) return;
    listDiv.innerHTML = '';
    
    if (!data.length) {
      listDiv.innerHTML = '<div class="empty-state">✨ No items yet. Add something!</div>';
      return;
    }
    
    data.forEach(item => {
      const div = document.createElement('div');
      div.className = 'card';
      
      div.innerHTML = `
        <div class="topRow">
          <div class="leftSide">
            <input type="checkbox" ${item.done ? 'checked' : ''} onclick="toggleDone(${item.id}, ${item.done})">
            <div class="item-text ${item.done ? 'done' : ''}">
              <div class="item-name">${escapeHtml(item.name)}</div>
              <div class="item-date">${item.date ? formatDate(item.date) : 'no due date'}</div>
            </div>
          </div>
          <button class="deleteBtn" onclick="deleteItem(${item.id})">🗑️</button>
        </div>
        ${item.image ? `<img src="${escapeHtml(item.image)}" onerror="this.style.display='none'">` : ''}
      `;
      
      listDiv.appendChild(div);
      
      if (!item.done && item.date) {
        storeReminder(item);
      }
    });
  }
  
  function escapeHtml(str) {
    if (!str) return '';
    return str.replace(/[&<>]/g, function(m) {
      if (m === '&') return '&amp;';
      if (m === '<') return '&lt;';
      if (m === '>') return '&gt;';
      return m;
    });
  }
  
  // Events
  document.addEventListener("visibilitychange", () => {
    if (!document.hidden) {
      debugLog("📱 App reopened - checking pending reminders");
      checkPendingReminders();
      loadItems();
    }
  });
  
  // Init
  async function init() {
    debugLog("🚀 Starting...");
    initOneSignal();
    await loadItems();
    checkPendingReminders();
    updatePushUI();
    
    setInterval(() => {
      if (!document.hidden) checkPendingReminders();
    }, 30000);
  }
  
  init();
</script>
</body>
</html>
