
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Reminder</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #eef2f3;
  padding: 20px;
}

h1 {
  text-align: center;
}

.container {
  background: white;
  padding: 15px;
  border-radius: 25px;
  box-shadow: 0 10px 25px rgba(0,0,0,0.08);
}

input, button {
  width: 100%;
  padding: 12px;
  margin-top: 10px;
  border-radius: 15px;
  border: none;
  background: #f1f1f1;
}

button {
  background: #4CAF50;
  color: white;
  font-weight: bold;
}

.card {
  background: white;
  padding: 12px;
  margin-top: 12px;
  border-radius: 20px;
  display: flex;
  align-items: center;
  gap: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.05);
}

img {
  width: 70px;
  height: 70px;
  border-radius: 15px;
  object-fit: cover;
}

.small {
  font-size: 12px;
  color: gray;
}
</style>
</head>

<body>

<h1>Shopping Reminder</h1>

<div class="container">
  <input id="name" placeholder="Item name or paste Amazon link">
  <input id="date" type="datetime-local">
  <button onclick="addItem()">Add Item</button>
</div>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://akxoqcizqqqmwezocrvv.supabase.co";
const SUPABASE_KEY = "YOUR_KEY_HERE"; // keep yours

// 🔔 Request notification permission
if ("Notification" in window) {
  Notification.requestPermission();
}

// 🧠 Extract Amazon image
async function getAmazonImage(url) {
  try {
    const res = await fetch("https://api.allorigins.win/get?url=" + encodeURIComponent(url));
    const data = await res.json();
    const html = data.contents;

    const match = html.match(/"hiRes":"(.*?)"/);
    if (match) return match[1].replace(/\\u0026/g, "&");
  } catch {}
  return null;
}

// 🖼️ Auto image (fallback)
function getImageFromName(name) {
  return "https://source.unsplash.com/featured/?" + encodeURIComponent(name);
}

// ➕ Add item
async function addItem() {
  let name = document.getElementById("name").value;
  let date = document.getElementById("date").value;

  if (!name) return alert("Enter item");

  let image = "";

  // If Amazon link
  if (name.includes("amazon.com")) {
    image = await getAmazonImage(name);
    name = "Amazon Item";
  }

  if (!image) {
    image = getImageFromName(name);
  }

  await fetch(SUPABASE_URL + "/rest/v1/items", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    },
    body: JSON.stringify({ name, date, image })
  });

  scheduleNotification(name, date);
  loadItems();
}

// 🔔 Simple notification (works while app open)
function scheduleNotification(name, date) {
  if (!date) return;

  const time = new Date(date).getTime() - Date.now();

  if (time > 0) {
    setTimeout(() => {
      if (Notification.permission === "granted") {
        new Notification("Shopping Reminder", {
          body: "Buy: " + name
        });
      }
    }, time);
  }
}

// 📥 Load items
async function loadItems() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/items?select=*", {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();
  const list = document.getElementById("list");
  list.innerHTML = "";

  data.reverse().forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    const img = document.createElement("img");
    img.src = item.image;

    const text = document.createElement("div");
    text.innerHTML = `
      <b>${item.name}</b>
      <div class="small">${item.date || ""}</div>
    `;

    div.appendChild(img);
    div.appendChild(text);
    list.appendChild(div);
  });
}

loadItems();
</script>

</body>
</html>
