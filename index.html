
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Reminder</title>

<style>
body {
  font-family: Arial;
  background: #f4f4f4;
  padding: 20px;
}

h1 {
  text-align: center;
}

input, button {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: 1px solid #ccc;
}

button {
  background: #4CAF50;
  color: white;
  border: none;
}

.card {
  background: white;
  padding: 10px;
  margin-top: 10px;
  border-radius: 15px;
  display: flex;
  align-items: center;
  gap: 10px;
}
</style>
</head>

<body>

<h1>Shopping Reminder</h1>

<input id="name" placeholder="Item name">
<input id="date" type="datetime-local">
<input id="image" placeholder="Image URL (optional)">
<button onclick="addItem()">Add Item</button>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://akxoqcizqqqmwezocrvv.supabase.co";
const SUPABASE_KEY = "YOUR_KEY_HERE";

// 🔔 notifications
if ("Notification" in window) {
  Notification.requestPermission();
}

// 📅 format date
function formatDate(dateStr) {
  if (!dateStr) return "";
  return new Date(dateStr).toLocaleString();
}

// ⌨️ ENTER KEY SUPPORT
document.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    addItem();
  }
});

// ➕ add item
async function addItem() {
  const name = document.getElementById("name").value;
  const date = document.getElementById("date").value;
  const image = document.getElementById("image").value;

  if (!name) return;

  const item = { name, date, image };

  // 🔥 instant UI update
  renderItem(item, true);

  try {
    await fetch(SUPABASE_URL + "/rest/v1/items", {
      method: "POST",
      headers: {
        "Content-Type": "application/json",
        "apikey": SUPABASE_KEY,
        "Authorization": "Bearer " + SUPABASE_KEY
      },
      body: JSON.stringify(item)
    });

  } catch (e) {
    alert("Error saving item");
  }

  scheduleNotification(name, date);

  document.getElementById("name").value = "";
  document.getElementById("date").value = "";
  document.getElementById("image").value = "";
}

// 🔔 notification (open app)
function scheduleNotification(name, date) {
  if (!date) return;

  const delay = new Date(date).getTime() - Date.now();

  if (delay > 0) {
    setTimeout(() => {
      if (Notification.permission === "granted") {
        new Notification("Shopping Reminder", {
          body: "Buy: " + name
        });
      }
    }, delay);
  }
}

// 🧱 render one item
function renderItem(item, prepend=false) {
  const list = document.getElementById("list");

  const div = document.createElement("div");
  div.className = "card";

  let html = `<b>${item.name}</b><br>${formatDate(item.date)}`;

  if (item.image) {
    html += `<br><img src="${item.image}" width="60">`;
  }

  div.innerHTML = html;

  if (prepend) {
    list.prepend(div);
  } else {
    list.appendChild(div);
  }
}

// 📥 load items
async function loadItems() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/items?select=*", {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();

  const list = document.getElementById("list");
  list.innerHTML = "";

  data.forEach(item => renderItem(item));
}

loadItems();
</script>

</body>
</html>
