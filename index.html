
<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shopping Reminder</title>

<style>
body {
  font-family: -apple-system, sans-serif;
  background: #f2f2f7;
  padding: 20px;
}

h1 {
  text-align: center;
  font-size: 28px;
}

input, button {
  width: 100%;
  padding: 16px;
  margin-top: 12px;
  border-radius: 18px;
  border: none;
  font-size: 16px;
}

input {
  background: white;
}

button {
  background: #34c759;
  color: white;
  font-weight: bold;
}

.card {
  background: white;
  padding: 16px;
  margin-top: 14px;
  border-radius: 20px;
  font-size: 16px;
  display: flex;
  flex-direction: column;
}

.topRow {
  display: flex;
  align-items: center;
  justify-content: space-between;
}

img {
  width: 100%;
  border-radius: 15px;
  margin-top: 8px;
}

.done {
  text-decoration: line-through;
  color: gray;
}

.smallBtn {
  background: red;
  padding: 8px;
  border-radius: 10px;
  color: white;
  border: none;
}
</style>
</head>

<body>

<h1>Shopping Reminder</h1>

<input id="name" placeholder="Item name">
<input id="date" type="datetime-local">
<input id="image" placeholder="Image URL (optional)">
<button onclick="addItem()">Add Item</button>

<div id="list"></div>

<script>
const SUPABASE_URL = "https://akxoqcizqqqmwezocrvv.supabase.co";
const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImFreG9xY2l6cXFxbXdlem9jcnZ2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM5NzEyMDIsImV4cCI6MjA4OTU0NzIwMn0.Z6MlXYW47gSlIEYEomjLHUwEeXV7pfBYYq9b73HXzhs";

// format date
function formatDate(d) {
  if (!d) return "";
  return new Date(d).toLocaleString();
}

// enter key
document.addEventListener("keydown", e => {
  if (e.key === "Enter") addItem();
});

// add item
async function addItem() {
  const name = nameInput.value;
  const date = dateInput.value;
  const image = imageInput.value;

  if (!name) return;

  await fetch(SUPABASE_URL + "/rest/v1/items", {
    method: "POST",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    },
    body: JSON.stringify({ name, date, image, done: false })
  });

  loadItems();

  nameInput.value = "";
  dateInput.value = "";
  imageInput.value = "";
}

// toggle done
async function toggleDone(id, current) {
  await fetch(SUPABASE_URL + "/rest/v1/items?id=eq." + id, {
    method: "PATCH",
    headers: {
      "Content-Type": "application/json",
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    },
    body: JSON.stringify({ done: !current })
  });

  loadItems();
}

// delete item
async function deleteItem(id) {
  await fetch(SUPABASE_URL + "/rest/v1/items?id=eq." + id, {
    method: "DELETE",
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    }
  });

  loadItems();
}

// load items
async function loadItems() {
  const res = await fetch(SUPABASE_URL + "/rest/v1/items?select=*", {
    headers: {
      "apikey": SUPABASE_KEY,
      "Authorization": "Bearer " + SUPABASE_KEY
    }
  });

  const data = await res.json();
  list.innerHTML = "";

  data.forEach(item => {
    const div = document.createElement("div");
    div.className = "card";

    const top = document.createElement("div");
    top.className = "topRow";

    const left = document.createElement("div");

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.checked = item.done || false;
    checkbox.onclick = () => toggleDone(item.id, item.done);

    const text = document.createElement("span");
    text.innerHTML = `<b>${item.name}</b><br>${formatDate(item.date)}`;
    if (item.done) text.classList.add("done");

    left.appendChild(checkbox);
    left.appendChild(text);

    const delBtn = document.createElement("button");
    delBtn.innerText = "Delete";
    delBtn.className = "smallBtn";
    delBtn.onclick = () => deleteItem(item.id);

    top.appendChild(left);
    top.appendChild(delBtn);

    div.appendChild(top);

    if (item.image) {
      const img = document.createElement("img");
      img.src = item.image;
      div.appendChild(img);
    }

    list.appendChild(div);
  });
}

loadItems();
</script>

</body>
</html>
